<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supersymmetry Explainer</title>

    <!-- 1. React & ReactDOM (Core) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- 2. Lucide Icons (아이콘 라이브러리) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 3. Tailwind CSS (디자인 프레임워크) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 4. Babel (브라우저에서 React/JSX 해석) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 추가적인 스타일이 필요하면 여기에 작성하세요 */
        body { background-color: #f8fafc; }
    </style>
</head>
<body>
    <!-- React가 그려질 목적지 -->
    <div id="root"></div>

    <!-- 
      주의: supersymmetry_explainer_2.js 파일 맨 위의 
      import React... 구문들은 반드시 삭제하거나 주석 처리해야 합니다!
    -->
    <script type="text/babel" data-type="module" src="supersymmetry_explainer_2.js"></script>

    <script type="text/babel">
        // 만약 위 src 호출이 계속 에러난다면, 
        // 여기에 .js 파일의 전체 내용을 복사해서 넣는 것이 가장 확실합니다.
    </script>
</body>
</html>
