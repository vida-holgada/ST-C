<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST&amp;C W07 - 증기기관은 어떻게 만들어졌나</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Roboto+Slab:wght@500;700&display=swap');

:root {
  --paper: #f5f0e6;
  --paper-2: #ebe0cf;
  --panel: #fffaf2;
  --ink: #211d19;
  --muted: #71665b;
  --faint: #9a8d80;
  --line: rgba(33, 29, 25, 0.16);
  --line-dark: rgba(33, 29, 25, 0.34);
  --iron: #3f4548;
  --iron-2: #656b6d;
  --brass: #b78237;
  --copper: #b55f3a;
  --steam: #e66f4c;
  --water: #2c7fb8;
  --teal: #2d7f73;
  --violet: #5f579c;
  --shadow: 0 18px 44px rgba(49, 34, 19, 0.12);
}

*,
*::before,
*::after { box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  margin: 0;
  background:
    linear-gradient(90deg, rgba(33, 29, 25, 0.035) 1px, transparent 1px),
    linear-gradient(180deg, var(--paper) 0%, #e7d9c4 100%);
  background-size: 32px 32px, auto;
  color: var(--ink);
  font-family: 'Noto Sans KR', system-ui, sans-serif;
  line-height: 1.62;
}

button {
  font: inherit;
}

.page {
  max-width: 1240px;
  margin: 0 auto;
  padding: 22px 18px 48px;
}

.topline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 18px;
}

.back-link {
  color: var(--muted);
  font-size: 14px;
  text-decoration: none;
}

.back-link:hover {
  color: var(--ink);
  text-decoration: underline;
}

.hero {
  min-height: 230px;
  display: grid;
  grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
  gap: 28px;
  align-items: end;
  padding: 38px 0 24px;
  border-bottom: 1px solid var(--line);
}

.eyebrow {
  color: var(--copper);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

h1 {
  margin: 8px 0 10px;
  font-family: 'Roboto Slab', 'Noto Sans KR', serif;
  font-size: clamp(34px, 5vw, 68px);
  line-height: 1.08;
  letter-spacing: 0;
}

.hero-copy {
  margin: 0;
  max-width: 720px;
  color: var(--muted);
  font-size: 17px;
}

.hero-motif {
  width: 100%;
  min-height: 150px;
}

.hero-motif svg {
  width: 100%;
  height: auto;
  display: block;
}

.timeline-nav {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
  margin: 20px 0;
}

.era-btn {
  min-height: 74px;
  appearance: none;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: rgba(255, 250, 242, 0.68);
  color: var(--ink);
  padding: 10px;
  cursor: pointer;
  text-align: left;
  transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
}

.era-btn:hover {
  transform: translateY(-1px);
  border-color: var(--line-dark);
}

.era-btn.is-active {
  background: var(--panel);
  border-color: var(--copper);
  box-shadow: inset 0 3px 0 var(--copper);
}

.era-year {
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

.era-name {
  margin-top: 2px;
  font-size: 15px;
  font-weight: 700;
}

.main-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  gap: 16px;
}

.machine-panel,
.side-card,
.explain-card,
.cycle-card {
  background: rgba(255, 250, 242, 0.82);
  border: 1px solid var(--line);
  border-radius: 6px;
  box-shadow: var(--shadow);
}

.machine-panel {
  padding: 14px;
}

.stage-header {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: start;
  margin-bottom: 10px;
}

.stage-kicker {
  color: var(--copper);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.stage-title {
  margin-top: 2px;
  font-size: 21px;
  font-weight: 700;
}

.stage-tagline {
  color: var(--muted);
  font-size: 14px;
}

.stage-badge {
  display: grid;
  place-items: center;
  min-width: 72px;
  min-height: 56px;
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--brass);
  font-family: 'Roboto Slab', serif;
  font-size: 23px;
  font-weight: 700;
}

.anim-box {
  border: 1px solid rgba(33, 29, 25, 0.12);
  border-radius: 6px;
  overflow: hidden;
  background: #f9f4eb;
}

.machine-svg {
  display: block;
  width: 100%;
  height: auto;
}

.controls {
  display: grid;
  grid-template-columns: auto minmax(120px, 1fr) 128px;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
}

.play-btn {
  min-width: 112px;
  border: 1px solid var(--line-dark);
  border-radius: 6px;
  background: var(--ink);
  color: #fffaf2;
  padding: 8px 12px;
  cursor: pointer;
}

.play-btn:hover {
  background: #3a332c;
}

.progress-track {
  height: 8px;
  background: rgba(33, 29, 25, 0.11);
  border-radius: 999px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--water), var(--steam), var(--brass));
  transition: width 0.1s linear;
}

.phase-label {
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
  text-align: right;
}

.side {
  display: grid;
  gap: 10px;
}

.side-card {
  padding: 13px;
  box-shadow: none;
}

.metric-label,
.section-label {
  color: var(--faint);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.metric-value {
  margin-top: 4px;
  font-size: 24px;
  font-weight: 700;
}

.metric-bar {
  height: 6px;
  margin-top: 8px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(33, 29, 25, 0.1);
}

.metric-fill {
  height: 100%;
  background: var(--copper);
}

.parts-list {
  display: grid;
  gap: 7px;
  margin-top: 9px;
}

.part-row {
  display: grid;
  grid-template-columns: 12px minmax(0, 1fr);
  gap: 8px;
  align-items: start;
  font-size: 13px;
  color: var(--muted);
}

.dot {
  width: 10px;
  height: 10px;
  margin-top: 6px;
  border-radius: 999px;
  background: var(--copper);
}

.details-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}

.explain-card {
  padding: 15px;
  box-shadow: none;
}

.explain-card p {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 14px;
}

.cycle-card {
  margin-top: 16px;
  padding: 15px;
  box-shadow: none;
}

.cycle-steps {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}

.cycle-step {
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr);
  gap: 9px;
  align-items: start;
  padding: 8px;
  border-radius: 6px;
  color: var(--muted);
  transition: background 0.18s ease, color 0.18s ease;
}

.cycle-step.is-active {
  background: rgba(44, 127, 184, 0.12);
  color: var(--ink);
}

.step-num {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  border-radius: 999px;
  background: rgba(33, 29, 25, 0.1);
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

.cycle-step.is-active .step-num {
  background: var(--water);
  color: white;
}

.follow-up {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}

.question-btn {
  border: 1px solid var(--line);
  border-radius: 6px;
  background: rgba(255, 250, 242, 0.7);
  color: var(--ink);
  padding: 8px 10px;
  cursor: pointer;
  font-size: 13px;
}

.question-btn:hover {
  border-color: var(--copper);
}

.answer-box {
  min-height: 44px;
  margin-top: 10px;
  padding: 10px 12px;
  border-left: 3px solid var(--copper);
  color: var(--muted);
  background: rgba(255, 250, 242, 0.66);
  font-size: 13px;
}

.svg-label {
  fill: #332b24;
  font-size: 13px;
  font-weight: 700;
}

.svg-small {
  fill: #6e6258;
  font-size: 11px;
}

.metal { fill: var(--iron-2); stroke: var(--iron); }
.copper { fill: var(--copper); stroke: #7f3e27; }
.brass { fill: var(--brass); stroke: #73501e; }
.steam { fill: var(--steam); }
.water { fill: var(--water); }
.teal { fill: var(--teal); stroke: #195c52; }
.violet { fill: var(--violet); stroke: #423b76; }
.pipe { fill: none; stroke: var(--iron); stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
.thin-pipe { fill: none; stroke: var(--iron-2); stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
.brace { fill: none; stroke: #75512d; stroke-width: 7; stroke-linecap: round; }
.flow { fill: none; stroke-width: 5; stroke-linecap: round; stroke-dasharray: 10 12; }
.rivets circle { fill: rgba(33, 29, 25, 0.42); }

@media (max-width: 980px) {
  .hero,
  .main-grid,
  .details-grid {
    grid-template-columns: 1fr;
  }

  .timeline-nav {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 620px) {
  .page { padding: 14px 12px 36px; }
  .timeline-nav { grid-template-columns: 1fr; }
  .stage-header,
  .controls {
    grid-template-columns: 1fr;
  }
  .stage-badge {
    width: 72px;
  }
  .phase-label {
    text-align: left;
  }
}
</style>
</head>
<body>
<main class="page">
  <div class="topline">
    <a class="back-link" href="./index.html">ST&amp;C 자료 목록</a>
    <span class="eyebrow">Week 07 · Industrial Revolution</span>
  </div>

  <section class="hero" aria-labelledby="page-title">
    <div>
      <div class="eyebrow">1698-1784</div>
      <h1 id="page-title">증기기관은 어떻게 만들어졌나</h1>
      <p class="hero-copy">완성품 하나가 갑자기 등장한 이야기가 아니다. 세이버리의 압력 탱크, 파팽의 피스톤, 뉴커먼의 요동빔, 와트의 분리 응축기와 회전 기구가 차례로 덧붙으며 산업혁명의 동력원이 만들어졌다.</p>
    </div>
    <div class="hero-motif" aria-hidden="true">
      <svg viewBox="0 0 420 180" role="img">
        <path class="pipe" d="M36 128H144C168 128 166 82 196 82H352"/>
        <circle cx="85" cy="128" r="34" fill="none" stroke="#3f4548" stroke-width="8"/>
        <circle cx="85" cy="128" r="8" fill="#3f4548"/>
        <circle cx="270" cy="82" r="42" fill="none" stroke="#b78237" stroke-width="9"/>
        <circle cx="270" cy="82" r="16" fill="none" stroke="#b55f3a" stroke-width="7"/>
        <path d="M34 156H386" stroke="rgba(33,29,25,.18)" stroke-width="3"/>
        <g fill="#e66f4c" opacity=".38">
          <circle cx="156" cy="42" r="16"/>
          <circle cx="184" cy="30" r="10"/>
          <circle cx="218" cy="42" r="13"/>
        </g>
      </svg>
    </div>
  </section>

  <nav class="timeline-nav" aria-label="증기기관 발전 단계"></nav>

  <section class="main-grid">
    <div class="machine-panel">
      <div class="stage-header" id="stage-header"></div>
      <div class="anim-box" id="anim-box"></div>
      <div class="controls">
        <button class="play-btn" id="play-btn" type="button">정지</button>
        <div class="progress-track" aria-hidden="true"><div class="progress-bar" id="cycle-bar"></div></div>
        <div class="phase-label" id="phase-label">대기 중</div>
      </div>
    </div>

    <aside class="side" id="stats-panel" aria-label="기술 요약"></aside>
  </section>

  <section class="details-grid">
    <article class="explain-card">
      <div class="section-label">개조: 무엇을 더했나</div>
      <p id="tinker-text"></p>
    </article>
    <article class="explain-card">
      <div class="section-label">수리: 무엇이 계속 고장났나</div>
      <p id="maint-text"></p>
    </article>
  </section>

  <section class="cycle-card">
    <div class="section-label">작동 사이클</div>
    <div class="cycle-steps" id="cycle-steps"></div>
    <div class="follow-up" id="follow-up"></div>
    <div class="answer-box" id="answer-box">질문을 누르면 수업 토론용 짧은 설명이 여기에 표시됩니다.</div>
  </section>
</main>

<script>
const stages = [
  {
    short: "세이버리",
    name: "토머스 세이버리: 광부의 친구",
    year: "1698",
    tagline: "피스톤 없이 증기 압력과 응축 진공만으로 물을 밀고 빨아올린 기관",
    eff: "0.5x",
    power: "약 1마력",
    useDesc: "얕은 갱도 양수",
    effScore: 13,
    tinker: "두 개의 구리 수조가 번갈아 작동했다. 한쪽은 보일러에서 온 증기 압력으로 물을 위로 밀어올리고, 다른 쪽은 찬물을 맞아 응축 진공을 만들며 갱도 물을 빨아올렸다. 핵심 부품은 압력 수조, 흡입 체크밸브, 토출 체크밸브, 수동 증기밸브였다.",
    maint: "압력을 올릴수록 물은 더 높이 올라갔지만, 납땜 이음매와 구리 수조가 버티지 못했다. 밸브는 손으로 맞춰 깎아 누설이 잦았고, 뜨거운 수조에 냉각수를 뿌리는 열충격도 큰 문제였다.",
    parts: [
      ["압력 수조 A/B", "#b55f3a"],
      ["보일러와 증기밸브", "#b78237"],
      ["흡입/토출 체크밸브", "#3f4548"],
      ["냉각수 분사관", "#2c7fb8"]
    ],
    cycle: [
      "증기밸브를 열어 수조 A를 증기로 채운다.",
      "수조 A의 증기 압력이 물을 토출관 위로 밀어올린다.",
      "수조 A 외벽에 찬물을 뿌려 증기를 응축시킨다.",
      "수조 A 안의 진공이 아래 갱도 물을 빨아올리고, 수조 B가 반대로 작동한다."
    ],
    questions: [
      ["왜 깊은 갱도에는 적합하지 않았나?", "물이 올라가는 높이를 압력으로 해결해야 했기 때문이다. 당시 보일러와 수조는 고압을 안전하게 견디기 어려웠고, 흡입 자체도 대기압 한계 때문에 얕은 깊이에 묶였다."],
      ["피스톤이 없다는 점이 왜 중요한가?", "피스톤이 없으면 왕복 운동을 바로 만들 수 없다. 세이버리 기관은 회전 동력이나 기계 구동보다 양수용 압력 장치에 가까웠다."]
    ],
    svg: saverySvg,
    animate: animateSavery
  },
  {
    short: "파팽",
    name: "드니 파팽: 피스톤이라는 발상",
    year: "1690-1707",
    tagline: "증기 응축으로 피스톤 아래에 진공을 만들고 대기압이 일을 하게 한 실험",
    eff: "0.6x",
    power: "실험용",
    useDesc: "원리 시연",
    effScore: 15,
    tinker: "파팽은 한 통 안에서 물을 끓이고 식히며 피스톤이 오르내릴 수 있음을 보였다. 실용 동력원은 아니었지만, 실린더와 피스톤이 대기압 기관의 핵심 부품이 될 수 있다는 점을 선명하게 만들었다.",
    maint: "같은 실린더를 매번 가열하고 냉각해야 했기 때문에 열 손실이 컸다. 금속 실린더는 열 팽창과 수축을 반복하며 뒤틀렸고, 피스톤 가장자리의 밀봉도 안정적이지 않았다. 안전밸브 발상은 이 위험을 다루는 중요한 유산이었다.",
    parts: [
      ["세로 실린더", "#5f579c"],
      ["피스톤과 로드", "#3f4548"],
      ["가열수와 증기", "#e66f4c"],
      ["안전밸브", "#b78237"]
    ],
    cycle: [

      "증기압이 피스톤을 밀어올린다.",
      "열원을 치우고 실린더를 냉각한다.",
      "증기가 응축되며 진공이 생기고 대기압이 피스톤을 내리누른다."

    questions: [

      ["안전밸브는 왜 중요했나?", "압력이 일정 수준을 넘으면 증기를 배출해 폭발을 막는다. 증기기관이 커질수록 안전밸브는 보일러 운전의 기본 장치가 되었다."]
    ],
    svg: papinSvg,
    animate: animatePapin
  },
  {
    short: "뉴커먼",
    name: "토머스 뉴커먼: 대기압 기관",
    year: "1712",
    tagline: "피스톤, 별도 보일러, 요동빔, 갱도 펌프가 결합된 첫 실용 기관",
    eff: "1.0x",
    power: "약 5.5마력",
    useDesc: "깊은 갱도 양수",

let currentStage = 0;
let animPhase = 0;
let animTime = 0;
let playing = true;
let rafId = null;

const nav = document.querySelector(".timeline-nav");
const playBtn = document.getElementById("play-btn");

function makeStageButtons() {
  nav.innerHTML = stages.map((stage, index) => `
    <button class="era-btn" type="button" data-era="${index}" aria-label="${stage.year} ${stage.short}">
      <div class="era-year">${stage.year}</div>
      <div class="era-name">${stage.short}</div>
    </button>
  `).join("");

  nav.querySelectorAll(".era-btn").forEach((button) => {
    button.addEventListener("click", () => {
      currentStage = Number(button.dataset.era);
      animPhase = 0;
      animTime = 0;
      renderStage();
    });
  });
}

function renderStage() {
  const stage = stages[currentStage];

  document.getElementById("stage-header").innerHTML = `
    <div>
      <div class="stage-kicker">${stage.year}</div>
      <div class="stage-title">${stage.name}</div>
      <div class="stage-tagline">${stage.tagline}</div>
    </div>
    <div class="stage-badge">${stage.eff}</div>
  `;

  document.getElementById("anim-box").innerHTML = stage.svg();

  document.getElementById("stats-panel").innerHTML = `
    <div class="side-card">
      <div class="metric-label">상대 효율</div>
      <div class="metric-value">${stage.eff}</div>
      <div class="metric-bar"><div class="metric-fill" style="width:${stage.effScore}%"></div></div>
    </div>
    <div class="side-card">
      <div class="metric-label">출력</div>
      <div class="metric-value">${stage.power}</div>
    </div>
    <div class="side-card">
      <div class="metric-label">주요 용도</div>
      <div class="metric-value">${stage.useDesc}</div>
    </div>
    <div class="side-card">
      <div class="metric-label">눈여겨볼 부품</div>
      <div class="parts-list">
        ${stage.parts.map(([name, color]) => `
          <div class="part-row"><span class="dot" style="background:${color}"></span><span>${name}</span></div>
        `).join("")}
      </div>
    </div>
  `;

  document.getElementById("tinker-text").textContent = stage.tinker;
  document.getElementById("maint-text").textContent = stage.maint;
  document.getElementById("cycle-steps").innerHTML = stage.cycle.map((step, index) => `
    <div class="cycle-step" data-step="${index}">
      <div class="step-num">${index + 1}</div>
      <div>${step}</div>
    </div>
  `).join("");

  document.getElementById("follow-up").innerHTML = stage.questions.map(([question], index) => `
    <button class="question-btn" type="button" data-question="${index}">${question}</button>
  `).join("");
  document.getElementById("answer-box").textContent = "질문을 누르면 수업 토론용 짧은 설명이 여기에 표시됩니다.";
  document.querySelectorAll(".question-btn").forEach((button) => {
    button.addEventListener("click", () => {
      const [, answer] = stage.questions[Number(button.dataset.question)];
      document.getElementById("answer-box").textContent = answer;
    });
  });

  document.querySelectorAll(".era-btn").forEach((button, index) => {
    button.classList.toggle("is-active", index === currentStage);
  });

  updateAnimation(0);
}

function e(id) {
  return document.getElementById(id);
}

function set(id, attr, value) {
  const element = e(id);
  if (element) element.setAttribute(attr, value);
}

function style(id, prop, value) {
  const element = e(id);
  if (element) element.style[prop] = value;
}

function lerp(start, end, t) {
  return start + (end - start) * t;
}

function phaseText(title, desc) {
  set("phase-title", "textContent", title);
  const titleElement = e("phase-title");
  const descElement = e("phase-desc");
  if (titleElement) titleElement.textContent = title;
  if (descElement) descElement.textContent = desc;
  document.getElementById("phase-label").textContent = title;
}

function updateCycleSteps() {
  document.querySelectorAll(".cycle-step").forEach((step, index) => {
    step.classList.toggle("is-active", index === animPhase);
  });
}

function updateAnimation(subT) {
  const stage = stages[currentStage];
  stage.animate(animPhase, subT);
  updateCycleSteps();
}

function step(timestamp) {
  if (!playing) return;
  if (!step.last) step.last = timestamp;
  const dt = (timestamp - step.last) / 1000;
  step.last = timestamp;
  animTime += dt;

  const phaseDuration = 1.55;
  const phaseCount = stages[currentStage].cycle.length;
  const totalDuration = phaseDuration * phaseCount;
  const cycleTime = animTime % totalDuration;
  animPhase = Math.floor(cycleTime / phaseDuration);
  const subT = (cycleTime % phaseDuration) / phaseDuration;

  document.getElementById("cycle-bar").style.width = `${(cycleTime / totalDuration) * 100}%`;
  updateAnimation(subT);
  rafId = requestAnimationFrame(step);
}

playBtn.addEventListener("click", () => {
  playing = !playing;
  playBtn.textContent = playing ? "정지" : "재생";
  if (playing) {
    step.last = null;
    rafId = requestAnimationFrame(step);
  } else if (rafId) {
    cancelAnimationFrame(rafId);
  }
});

function animateSavery(phase, t) {
  const titles = [
    ["증기 주입", "수조 A를 증기로 채워 내부 압력을 높임"],
    ["물 밀어올림", "증기 압력이 토출 체크밸브를 열고 물을 위로 보냄"],
    ["냉각수 분사", "수조 A 외벽 냉각으로 증기가 빠르게 응축"],
    ["진공 흡입", "수조 A가 갱도 물을 빨아들이고 수조 B는 반대로 작동"]
  ];
  phaseText(titles[phase][0], titles[phase][1]);
  set("pressurePulse0", "r", 8 + Math.sin(animTime * 8) * 5);
  set("steamFlow0", "opacity", phase === 0 ? 0.85 : 0.12);
  set("deliveryFlow0", "opacity", phase === 1 ? 0.85 : 0.12);
  set("suctionFlow0", "opacity", phase === 3 ? 0.85 : 0.12);
  set("sprayA0", "opacity", phase === 2 ? 1 : 0);
  set("sprayB0", "opacity", phase === 3 ? 0.8 : 0);
  set("steamValveA0", "fill", phase <= 1 ? "#e66f4c" : "#3f4548");
  set("steamValveB0", "fill", phase === 3 ? "#e66f4c" : "#3f4548");

  let aWaterY = 222;
  let aWaterH = 42;
  let bWaterY = 180;
  let bWaterH = 84;
  let aSteam = 24;
  let bSteam = 8;

  if (phase === 0) {
    aSteam = lerp(10, 40, t);
    aWaterY = 222;
    aWaterH = 42;
    bSteam = 8;
  } else if (phase === 1) {
    aSteam = lerp(40, 30, t);
    aWaterY = lerp(222, 252, t);
    aWaterH = lerp(42, 12, t);
  } else if (phase === 2) {
    aSteam = lerp(30, 2, t);
    aWaterY = 252;
    aWaterH = 12;
  } else {
    aSteam = 2;
    aWaterY = lerp(252, 190, t);
    aWaterH = lerp(12, 74, t);
    bSteam = lerp(8, 38, t);
    bWaterY = lerp(180, 222, t);
    bWaterH = lerp(84, 42, t);
  }

  set("tankAsteam0", "r", aSteam);
  set("tankAwater0", "y", aWaterY);
  set("tankAwater0", "height", aWaterH);
  set("tankAwaterTop0", "cy", aWaterY);
  set("tankBsteam0", "r", bSteam);
  set("tankBwater0", "y", bWaterY);
  set("tankBwater0", "height", bWaterH);
  set("tankBwaterTop0", "cy", bWaterY);
}

function animatePapin(phase, t) {
  const titles = [
    ["가열 시작", "실린더 바닥의 물이 끓으며 증기 발생"],
    ["피스톤 상승", "증기압이 피스톤을 밀어올림"],
    ["냉각 개시", "열원을 치우고 실린더를 식힘"],
    ["피스톤 하강", "응축 진공과 대기압으로 일 스트로크 발생"]
  ];
  phaseText(titles[phase][0], titles[phase][1]);
  let y = 128;
  if (phase === 0) y = 128;
  if (phase === 1) y = lerp(128, 72, t);
  if (phase === 2) y = 72;
  if (phase === 3) y = lerp(72, 128, t);

  set("piston1", "y", y);
  set("pistonRing1", "transform", `translate(0 ${y - 128})`);
  set("rod1", "y", y - 144);
  set("rod1", "height", 148 + (128 - y));
  set("steamCloud1", "opacity", phase < 2 ? lerp(0.35, 0.78, phase === 1 ? 1 : t) : lerp(0.7, 0, t));
  set("vacuum1", "opacity", phase === 3 ? lerp(0.2, 0.85, t) : 0);
  set("coolant1", "opacity", phase === 2 || phase === 3 ? (phase === 2 ? lerp(0, 1, t) : lerp(1, 0.35, t)) : 0);
  set("burner1", "opacity", phase <= 1 ? 1 : lerp(1, 0.15, t));
  set("safetyValve1", "transform", phase === 1 ? `rotate(${Math.sin(animTime * 10) * 6} 36 168)` : "rotate(0 36 168)");
}

function animateNewcomen(phase, t) {
  const titles = [
    ["증기 유입", "피스톤이 올라가고 펌프 쪽은 내려감"],
    ["냉수 분사", "실린더 내부에 찬물을 직접 분사"],
    ["진공 + 강하", "대기압이 피스톤을 아래로 누름"],
    ["펌프 스트로크", "반대편 펌프로드가 올라가 물을 끌어올림"]
  ];
  phaseText(titles[phase][0], titles[phase][1]);

  let pistonY = 238;
  let angle = 0;
  if (phase === 0) {
    pistonY = lerp(286, 224, t);
    angle = lerp(2.4, -2.2, t);
  } else if (phase === 1) {
    pistonY = 224;
    angle = -2.2;
  } else if (phase === 2) {
    pistonY = lerp(224, 286, t);
    angle = lerp(-2.2, 2.8, t);
  } else {
    pistonY = 286;
    angle = lerp(2.8, 2.0, t);
  }

  set("beam2", "transform", `rotate(${angle} 520 112)`);
  set("piston2", "y", pistonY);
  set("rod2", "y", 126);
  set("rod2", "height", Math.max(24, pistonY - 122));
  set("steam2", "opacity", phase === 0 ? 0.78 : phase === 1 ? lerp(0.78, 0.1, t) : 0.05);
  set("vacuum2", "opacity", phase === 2 ? lerp(0.15, 0.72, t) : phase === 3 ? 0.35 : 0);
  set("steamFlow2", "opacity", phase === 0 ? 0.8 : 0.1);
  set("spray2", "opacity", phase === 1 ? lerp(0, 1, t) : phase === 2 ? lerp(1, 0, t) : 0);
  set("plugRod2", "transform", `translate(470 ${172 + angle * 1.2})`);

  const pumpY = lerp(288, 232, (pistonY - 224) / 62);
  set("pumpBucket2", "y", pumpY);
  set("pumpRod2", "y", 180);
  set("pumpRod2", "height", Math.max(40, pumpY - 176));
  set("pumpWater2", "height", phase === 3 ? lerp(28, 16, t) : 28);
  set("pumpWater2", "y", phase === 3 ? lerp(318, 330, t) : 318);
  set("pumpFlow2", "opacity", phase === 3 ? 0.85 : 0.12);
}

function animateWattCondenser(phase, t) {
  const titles = [
    ["증기 → 실린더", "뜨거운 실린더가 증기로 채워짐"],
    ["응축기로 배기", "배기 증기가 차가운 응축기로 빠짐"],
    ["진공 + 강하", "응축기가 진공을 만들고 피스톤을 움직임"],
    ["공기펌프 배출", "응축수와 공기를 빼내 진공을 유지"]
  ];
  phaseText(titles[phase][0], titles[phase][1]);

  let pistonY = 244;
  let angle = 0;
  if (phase === 0) {
    pistonY = lerp(282, 232, t);
    angle = lerp(2.0, -2.0, t);
  } else if (phase === 1) {
    pistonY = 232;
    angle = -2.0;
  } else if (phase === 2) {
    pistonY = lerp(232, 282, t);
    angle = lerp(-2.0, 2.6, t);
  } else {
    pistonY = 282;
    angle = lerp(2.6, 1.0, t);
  }

  set("beam3", "transform", `rotate(${angle} 520 112)`);
  set("piston3", "y", pistonY);
  set("rod3", "y", 126);
  set("rod3", "height", Math.max(38, pistonY - 122));
  set("hotSteam3", "opacity", phase === 0 ? 0.82 : phase === 1 ? lerp(0.82, 0.35, t) : 0.18);
  set("boilerFlow3", "opacity", phase === 0 ? 0.82 : 0.12);
  set("condenserFlow3", "opacity", phase === 1 ? 0.86 : 0.1);
  set("vacuum3", "opacity", phase === 2 ? lerp(0.1, 0.85, t) : phase === 3 ? 0.45 : 0);
  const pumpY = phase === 3 ? lerp(284, 310, t) : 284 + Math.sin(animTime * 5) * 2;
  set("airPumpPiston3", "y", pumpY);
  set("airPumpRod3", "y", 160);
  set("airPumpRod3", "height", Math.max(40, pumpY - 156));
  set("airPumpOut3", "opacity", phase === 3 ? 0.82 : 0.15);
  set("coldCoils3", "opacity", phase === 1 || phase === 2 ? 1 : 0.5);
}

function animateWattRotary(phase, t) {
  const titles = [
    ["상측 증기", "피스톤 위쪽 흡기, 아래 방향 스트로크"],
    ["밸브 전환", "위쪽은 배기, 아래쪽은 흡기로 전환"],
    ["하측 증기", "피스톤 아래쪽 흡기, 위 방향 스트로크"],
    ["회전 + 조속", "기어와 플라이휠이 회전하고 조속기가 스로틀을 조절"]
  ];
  phaseText(titles[phase][0], titles[phase][1]);

  let pistonY = 254;
  let angle = 0;
  if (phase === 0) {
    pistonY = lerp(226, 288, t);
    angle = lerp(-2.0, 2.5, t);
  } else if (phase === 1) {
    pistonY = 288;
    angle = 2.5;
  } else if (phase === 2) {
    pistonY = lerp(288, 226, t);
    angle = lerp(2.5, -2.0, t);
  } else {
    pistonY = 226;
    angle = -2.0;
  }

  set("beam4", "transform", `rotate(${angle} 360 112)`);
  set("piston4", "y", pistonY);
  set("rod4", "y", 126);
  set("rod4", "height", Math.max(40, pistonY - 122));
  set("parallelMotion4", "transform", `translate(0 ${angle * 1.1})`);
  set("steamTop4", "opacity", phase === 0 ? 0.85 : phase === 1 ? lerp(0.85, 0.15, t) : phase === 3 ? lerp(0.15, 0.75, t) : 0.08);
  set("steamBot4", "opacity", phase === 2 ? 0.85 : phase === 1 ? lerp(0.1, 0.72, t) : phase === 3 ? lerp(0.72, 0.08, t) : 0.08);
  set("topValve4", "opacity", phase === 0 || phase === 3 ? 1 : 0.45);
  set("bottomValve4", "opacity", phase === 1 || phase === 2 ? 1 : 0.45);
  set("topSteamFlow4", "opacity", phase === 0 || phase === 3 ? 0.75 : 0.12);
  set("bottomSteamFlow4", "opacity", phase === 1 || phase === 2 ? 0.75 : 0.12);

  const rotation = (animTime * 110) % 360;
  set("flywheel4", "transform", `rotate(${rotation} 0 0)`);
  set("sunGear4", "transform", `rotate(${rotation} 0 0)`);
  set("planetGear4", "transform", `rotate(${rotation * 1.8} 0 0)`);
  const crankX = Math.cos((rotation - 80) * Math.PI / 180) * 48;
  const crankY = Math.sin((rotation - 80) * Math.PI / 180) * 48;
  set("connectingRod4", "d", `M542 ${112 + angle * 2}L${642 + crankX} ${260 + crankY}`);

  const spread = 26 + Math.sin(animTime * 5) * 8;
  const drop = 60 - (spread - 26) * 0.5;
  const balls = e("govBalls4");
  if (balls) {
    balls.innerHTML = `
      <line x1="0" y1="0" x2="${-spread}" y2="${drop}" stroke="#3f4548" stroke-width="4"/>
      <line x1="0" y1="0" x2="${spread}" y2="${drop}" stroke="#3f4548" stroke-width="4"/>
      <circle cx="${-spread}" cy="${drop}" r="13" fill="#5f579c" stroke="#423b76" stroke-width="3"/>
      <circle cx="${spread}" cy="${drop}" r="13" fill="#5f579c" stroke="#423b76" stroke-width="3"/>
    `;
  }
  set("throttle4", "transform", `rotate(${(spread - 26) * 1.6} 0 190)`);
}

makeStageButtons();
renderStage();
rafId = requestAnimationFrame(step);
</script>
